services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "3000:3000"
    command: ["npm", "run", "dev:client", "--", "--host", "0.0.0.0"]
    env_file: .env
    depends_on:
      - server

  server:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "5000:5000"
    command: ["npm", "run", "dev:server"]
    env_file: .env
    environment:
      MONGO_URI: mongodb://db:27017/reactrps
    depends_on:
      - db

  db:
    image: mongo:8
    ports:
      - "27017:27017"
    volumes:
      - mongodb-data:/data/db
volumes:
  mongodb-data: {}
